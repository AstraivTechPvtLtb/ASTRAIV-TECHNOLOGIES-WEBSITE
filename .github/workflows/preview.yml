# Preview Deployment CI/CD Workflow for Vercel
# This workflow runs linting, unit tests, build checks, and deploys a preview version of the application on Vercel.
# It is triggered automatically when a Pull Request is opened, synchronized, or reopened against the main branch.

name: Vercel Preview Deployment

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

# Set permissions for GitHub token to least-privilege
# contents: read is required to checkout code.
# pull-requests: write is required to post the preview URL comment on the PR.
permissions:
  contents: read
  pull-requests: write

jobs:
  ci-and-preview:
    name: Lint, Test, Build, and Preview Deploy
    runs-on: ubuntu-latest

    # Ensure environment variables are passed to Vercel CLI commands
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      # Step 1: Checkout the code
      # Official GitHub Action to checkout repository contents.
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      # Setup Node.js with the specified version: 20.20.2.
      # Utilizes native package manager caching for npm to cache node_modules.
      - name: Setup Node.js (20.20.2)
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.2'
          cache: 'npm'

      # Step 3: Install dependencies
      # Use `npm ci` for deterministic, clean installs based on package-lock.json.
      - name: Install Dependencies
        run: npm ci

      # Step 4: Run Linter
      # Fail workflow if ESLint detects any errors.
      - name: Run Linting Checks
        run: npm run lint

      # Step 5: Run Unit Tests
      # Fail workflow if any unit tests fail.
      - name: Run Unit Tests
        run: npm run test

      # Step 6: Install Vercel CLI
      # Install official Vercel CLI globally on the runner.
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Step 7: Pull Vercel Environment Information
      # Pull preview environment details, system environment variables, and project settings from Vercel.
      # This generates the .vercel/project.json and .vercel/.env.preview.local configuration files.
      - name: Pull Vercel Environment Configuration
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      # Step 8: Build Vercel Project Artifacts
      # Compile code and generate preview build artifacts locally in the runner.
      # This produces the prebuilt output in `.vercel/output`.
      # Next.js build errors, TypeScript errors, or Prisma errors will cause this step to fail.
      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      # Step 9: Deploy Prebuilt Artifacts to Vercel (Preview)
      # Deploy the local `.vercel/output` prebuilt folder to Vercel as a preview environment.
      # Captures the output deployment URL and extracts the URL via grep.
      - name: Deploy Prebuilt Artifacts to Vercel Preview
        id: deploy
        run: |
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} > deployment-output.txt
          cat deployment-output.txt
          PREVIEW_URL=$(grep -oEi "https://[a-zA-Z0-9.-]+\.vercel\.app" deployment-output.txt | head -n 1)
          if [ -z "$PREVIEW_URL" ]; then
            echo "Error: Failed to parse preview deployment URL from Vercel output" >&2
            exit 1
          fi
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      # Step 10: Comment on PR with the Preview URL
      # Post a comment to the Pull Request containing the deployment URL.
      # Uses the official github-script action for API calls to GitHub.
      - name: Comment on PR with preview URL
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const url = '${{ steps.deploy.outputs.preview_url }}';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: `🚀 **Vercel Preview Deployment** is ready!\n\n🔗 **Preview URL:** [${url}](${url})\n\n*(Deploy built from commit ${context.sha.substring(0, 7)})*`
            });
